name: Find SSH port

on:
  workflow_dispatch:

jobs:
  find-port:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        port: [22, 1022, 2222, 222, 10022]
    steps:
      - name: Try port ${{ matrix.port }}
        continue-on-error: true
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ matrix.port }}
          script: |
            echo "✅ Порт ${{ matrix.port }} работает!"
            pwd
